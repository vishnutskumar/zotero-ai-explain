repos:
  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        entry: detect-secrets-hook --baseline .secrets.baseline
        language: system
        # Narrow the skip list: only exclude noisy lockfiles + the baseline
        # file itself. Source, JSON config, and Markdown are scanned so a
        # credentials.json or .env.example with a real key cannot land.
        exclude: '(package-lock\.json$|\.secrets\.baseline$)'
      - id: universal-checks
        name: universal repository checks
        entry: node scripts/precommit-universal.mjs
        language: system
        pass_filenames: false
      - id: sync-agents
        name: sync AGENTS.md from CLAUDE.md
        entry: node scripts/sync-agents-from-claude.mjs
        language: system
        files: (^|/)CLAUDE\.md$
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npm run format:write
        language: system
        files: \.(js|mjs|cjs|ts|tsx|json|css|md|yaml|yml)$
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        files: \.(js|mjs|cjs|ts|tsx)$
        pass_filenames: false
      - id: typecheck
        name: typescript typecheck
        entry: npm run typecheck
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
      - id: test
        name: vitest
        entry: npm run test
        language: system
        files: \.(ts|tsx|mjs)$
        pass_filenames: false
        stages: [pre-push]
      - id: coverage-gate
        name: coverage gate (≥80% lines/statements/functions, ≥75% branches)
        # Runs `npm run test:coverage` then `node scripts/precommit-coverage.mjs`
        # which reads coverage/coverage-summary.json and fails the push if
        # any threshold is breached. Pre-push (not pre-commit) so single
        # commits stay fast; coverage is the deploy-blocking surface.
        entry: npm run test:coverage:check
        language: system
        files: \.(ts|tsx|mjs|cjs|js)$
        pass_filenames: false
        stages: [pre-push]
      - id: npm-audit
        name: npm audit
        entry: npm audit --audit-level=high
        language: system
        files: package(-lock)?\.json$
        pass_filenames: false
        stages: [pre-push]
